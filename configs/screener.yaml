exchange:
  provider: bybit
  env: demo
  category: linear
  base_url: https://api-demo.bybit.com

execution:
  enabled: true
  dry_run: false
  position_mode: one_way
  order_type: market
  usdt_per_trade: 50
  reduce_only_exit: true
  set_stop_loss: true
  stop_loss_percent: 1.5

timeframe: 15m
symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - LINKUSDT
  - HBARUSDT

candles: 1000
vol_window: 100
markov_window: 500
extrema_window: 3

include_shorts: true
commission: 0.00055

workers: 4

z_strong_threshold: 1.2
z_weak_threshold: 0.3

stop_loss_pct: 0.03
use_phase_filter: true
short_only: false
long_only: false
adaptive_mode: true
min_hold_bars: 10
cooldown_bars: 3
long_exit_confirm_bars: 7
short_exit_confirm_bars: 4

short_score_threshold:  0.02 #0.10
long_score_threshold: 0.02 #0.12

regime_filter_enabled: true
extreme_zscore_cut: 2.20
regime_entropy_cut: 1.55
post_extreme_bars: 6

use_dynamic_zscore: true
dynamic_z_window: 400
dynamic_z_percentile: 90
dynamic_z_fallback_cut: 2.20
dynamic_z_min_cut: 2.20
dynamic_z_max_cut: 3.00
dynamic_z_min_samples: 50

runtime:
  bootstrap_days: 7
  run_on_start: true
  poll_interval_seconds: 5