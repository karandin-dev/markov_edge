# === EXIT LOGIC ===
exit:
  # Адаптивный выход на основе уверенности модели
  adaptive:
    enabled: true
    base_conf_threshold: 0.85          # Базовый порог уверенности для выхода
    
    # Динамическая подстройка под волатильность
    vol_adjustment:
      enabled: true
      factor: 0.25                     # Коэффициент влияния volRatio: adj = base * (1 - factor*(vol-1))
      
    # Ограничения динамического порога (clamp)
    clamp:
      min: 0.45                        # Минимальный порог (при очень высокой волатильности)
      max: 0.90                        # Максимальный порог (при очень низкой волатильности)
  
  # Сигнальный выход (деградация скоринга)
  signal:
    long_confirm_bars: 2               # Сколько свечей подряд сигнал должен быть против позиции
    short_confirm_bars: 2
    
  # Минимальное удержание позиции (в свечах)
  min_hold_bars: 4
# вход
entry:
  max_vol_filter: 1.8  # ← Рекомендуется добавить

# === SUB-FRAME MONITORING ===
subframe:
  enabled: true
  timeframe: 5m                    # Суб-фрейм для мониторинга
  
  # Влияние на выходы
  exit:
    early_warning: true            # Раннее предупреждение о развороте
    pnl_protection: true           # Ускоренный выход при убытке на 5m
    trail_refinement: true         # Уточнение трейлинг-стопа
    
  # Пороги для 5m сигналов
  thresholds:
    score_change_warning: 0.03     # Изменение скора на 5m для предупреждения
    pnl_acceleration: 0.25          # % PnL на 5m для ускоренного выхода
    confirm_bars: 2                # Сколько свечей 5m подряд для подтверждения
    
  # Ограничения
  constraints:
    respect_min_hold: true         # Не выходить раньше min_hold_bars из 15m
    max_early_exit_loss: 0.8       # Макс. убыток % для раннего выхода

# === TAKE PROFIT ===
take_profit:
  enabled: true
  partial:
    enabled: true
    at_percent: 1.5        # Фиксируем 30% когда профит 1.5%
    close_ratio: 0.30      # Закрываем 30% позиции
  trailing:
    aggressive_offset: 0.0015  # Ужесточаем трейлинг до 0.15% после частичного выхода